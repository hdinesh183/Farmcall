services:
  - type: web
    name: farmcall-api
    env: python
    region: ohio
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn main:app -w 4 -k uvicorn.workers.UvicornWorker -b 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: DATABASE_URL
        fromDatabase:
          name: farmcall-db
          property: connectionString
      - key: TOMORROW_IO_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: MURF_API_KEY
        sync: false
      - key: MURF_API_URL
        value: "https://api.murf.ai/v1/speech/generate"
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: NGROK_URL
        sync: false

databases:
  - name: farmcall-db
    plan: free
    region: ohio
    databaseName: farmcall_db
